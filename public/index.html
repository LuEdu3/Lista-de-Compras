<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <meta name="theme-color" content="#4caf50">
    <link rel="manifest" href="manifest.json">
</head>

<body>
    <div id="listSelectionScreen" class="list-selection-screen active">
        <div class="list-selection-container">
            <h2>Minhas Listas</h2>
            <ul id="userLists" class="user-lists">
            </ul>
            <button id="openCreateListModalBtn" class="create-list-btn">
                <i class="fas fa-plus"></i> Criar Nova Lista
            </button>

            <div class="modal-overlay" id="createListModal" tabindex="-1">
                <div class="modal create-list-modal" role="dialog" aria-modal="true"
                    aria-labelledby="createListModalTitle">
                    <div class="modal-header">
                        <h3 id="createListModalTitle">Criar Nova Lista</h3>
                        <button class="close-modal-btn" id="closeCreateListModalBtn" aria-label="Fechar">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="modal-body">
                        <form id="createListForm">
                            <div class="input-group">
                                <label for="newListName">Nome da Lista:</label>
                                <input type="text" id="newListName" placeholder="Ex: Compras do Mês" required>
                            </div>
                            <div class="modal-actions">
                                <button type="submit" class="btn btn-primary">Criar Lista</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="mainScreen" class="main-screen inactive">
        <header class="header">
            <button id="backToListsBtn" class="back-button">
                <i class="fas fa-arrow-left"></i> Voltar para Listas
            </button>
            <h1 id="currentListName">Minha Lista de Compras</h1>
            <div class="header-stats">
                <div class="stat-card">
                    <span class="stat-label">Total de Itens:</span>
                    <span id="totalItems" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Valor Total:</span>
                    <span id="totalPrice" class="stat-value">R$ 0,00</span>
                </div>
            </div>
        </header>

        <main class="container">            <form id="addItemForm" class="add-item-form">
                <div class="input-group">
                    <input type="text" id="itemName" placeholder="Nome do item" required>
                    <input type="number" id="itemQuantity" placeholder="Qtd" value="1" min="1">
                    <input type="number" id="itemPrice" placeholder="Preço (opcional)" step="0.01" min="0">
                </div>
                <div class="category-selection">
                    <button type="button" id="openCategoryModalBtn" class="btn btn-secondary">
                        <i class="fas fa-tag"></i> Categoria: Geral
                    </button>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="addItemBtn">
                        <i class="fas fa-plus"></i> Adicionar
                    </button>
                </div>
            </form>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">Todos</button>
                <button class="filter-btn" data-filter="pending">Pendentes</button>
                <button class="filter-btn" data-filter="completed">Comprados</button>
            </div>

            <div class="filter-container">
                <label for="categoryFilter">Filtrar por Categoria:</label>
                <select id="categoryFilter">
                    <option value="all">Todas</option>
                    <option value="geral">Geral</option>
                    <option value="alimentos">Alimentos</option>
                    <option value="bebidas">Bebidas</option>
                    <option value="limpeza">Limpeza</option>
                    <option value="higiene">Higiene</option>
                </select>
            </div>

            <ul id="shoppingList" class="shopping-list">
            </ul>

            <div id="emptyState" class="empty-state">
                <i class="fas fa-box-open empty-icon"></i>
                <p>Sua lista está vazia!</p>
                <p>Adicione um item acima para começar.</p>
            </div>

            <div class="summary-card">
                <div class="summary-item">
                    <span>Itens na lista:</span>
                    <span id="summaryItems">0</span>
                </div>
                <div class="summary-item">
                    <span>Itens comprados:</span>
                    <span id="summaryCompleted">0</span>
                </div>
                <div class="summary-item total">
                    <span>Total da compra:</span>
                    <span id="summaryTotal">R$ 0,00</span>
                </div>
            </div>

            <div class="list-actions-bottom">
                <button id="clearCompleted" class="btn btn-secondary">
                    <i class="fas fa-check-double"></i> Limpar Comprados
                </button>
                <button id="clearAll" class="btn btn-danger">
                    <i class="fas fa-trash-alt"></i> Limpar Lista
                </button>
            </div>
        </main>

        <div class="modal-overlay" id="categoryModal" tabindex="-1">
            <div class="modal category-modal" role="dialog" aria-modal="true" aria-labelledby="categoryModalTitle">
                <div class="modal-header">
                    <h3 id="categoryModalTitle">Selecionar Categoria</h3>
                    <button class="close-modal-btn" id="closeCategoryModal" aria-label="Fechar">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body category-options-grid">
                    <button class="category-option" data-value="geral">
                        <i class="fas fa-shopping-basket"></i>
                        <span>Geral</span>
                    </button>
                    <button class="category-option" data-value="alimentos">
                        <i class="fas fa-apple-alt"></i>
                        <span>Alimentos</span>
                    </button>
                    <button class="category-option" data-value="limpeza">
                        <i class="fas fa-spray-can"></i>
                        <span>Limpeza</span>
                    </button>
                    <button class="category-option" data-value="bebidas">
                        <i class="fas fa-wine-bottle"></i>
                        <span>Bebidas</span>
                    </button>
                    <button class="category-option" data-value="higiene">
                        <i class="fas fa-toilet-paper"></i>
                        <span>Higiene</span>
                    </button>
                    <button class="category-option" data-value="casa">
                        <i class="fas fa-house-damage"></i>
                        <span>Casa</span>
                    </button>
                    <button class="category-option" data-value="congelados">
                        <i class="fas fa-ice-cream"></i>
                        <span>Congelados</span>
                    </button>
                    <button class="category-option" data-value="laticinios">
                        <i class="fas fa-cheese"></i>
                        <span>Laticínios</span>
                    </button>
                    <button class="category-option" data-value="padaria">
                        <i class="fas fa-bread-slice"></i>
                        <span>Padaria</span>
                    </button>
                    <button class="category-option" data-value="carnes">
                        <i class="fas fa-drumstick-bite"></i>
                        <span>Carnes</span>
                    </button>
                    <button class="category-option" data-value="hortifruti">
                        <i class="fas fa-carrot"></i>
                        <span>Hortifruti</span>
                    </button>
                    <button class="category-option" data-value="outros">
                        <i class="fas fa-box"></i>
                        <span>Outros</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="categoriaVisual"></div>
    </div>

    <div id="notificationContainer" class="notification-container"></div>

    <script src="js/script.js"></script>
    <script>
        // Service Worker registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('service-worker.js').then(function (reg) {
                    console.log('Service Worker registrado!', reg);
                }).catch(function (err) {
                    console.error('Erro ao registrar o Service Worker:', err);
                });
            });
        }
    </script>
</body>

</html>
